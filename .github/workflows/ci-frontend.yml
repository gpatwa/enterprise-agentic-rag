# .github/workflows/ci-frontend.yml
# Frontend CI — TypeScript type-check, Vitest unit tests, Playwright E2E,
# and a production build verification (including the SEO prerender step).
name: CI (frontend)

on:
  push:
    branches: [main]
    paths:
      - "services/api/frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/api/frontend/**"
      - ".github/workflows/ci-frontend.yml"

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: services/api/frontend

jobs:
  # ──────────────────────────────────────────────────
  # 1. Type-check + Vitest unit tests + lint.
  #    Fast (~30s); runs on every push/PR.
  # ──────────────────────────────────────────────────
  unit:
    name: Type-check & Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/api/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Vitest unit tests
        run: npm test

  # ──────────────────────────────────────────────────
  # 2. Production build — verifies the whole bundle pipeline:
  #    TypeScript compile, Vite chunk splitting, SEO templater,
  #    and Playwright-based prerender of /welcome.
  # ──────────────────────────────────────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/api/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright Chromium (for prerender)
        run: npx playwright install --with-deps chromium

      - name: Build (with prerender + SEO templater)
        env:
          VITE_SITE_URL: https://compass.example.com
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.html || (echo "MISSING dist/index.html" && exit 1)
          test -f dist/welcome/index.html || (echo "MISSING prerendered /welcome" && exit 1)
          test -f dist/sitemap.xml || (echo "MISSING dist/sitemap.xml" && exit 1)
          test -f dist/robots.txt || (echo "MISSING dist/robots.txt" && exit 1)
          # Sanity: prerender must contain the hero h1 and at least one JSON-LD block
          grep -q 'id="hero-heading"' dist/welcome/index.html
          grep -q 'application/ld+json' dist/welcome/index.html
          echo "All build artifacts present and prerender contains expected markers."

      - name: Bundle-size budget check (informational)
        run: |
          echo "::group::Built JS chunk sizes"
          ls -lah dist/assets/*.js | awk '{print $5, $9}'
          echo "::endgroup::"
          # Soft warn if entry chunk exceeds 200 KB raw — current is ~115 KB.
          ENTRY_BYTES=$(stat -c %s dist/assets/index-*.js | head -1)
          if [ -n "$ENTRY_BYTES" ] && [ "$ENTRY_BYTES" -gt 204800 ]; then
            echo "::warning ::entry bundle is ${ENTRY_BYTES} bytes (>200KB) — consider lazy-loading more"
          fi

  # ──────────────────────────────────────────────────
  # 3. Playwright E2E — runs the page.route()-mocked flow.
  #    Slower (~1-2min). Separate job so unit failures fail fast.
  # ──────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/api/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/api/frontend/playwright-report/
          retention-days: 7
