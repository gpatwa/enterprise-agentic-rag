# .github/workflows/ci.yml
# Continuous Integration — Lint + Test + Docker Build for backend on every
# PR and push to main. Frontend CI lives in ci-frontend.yml.
name: CI (backend)

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - "services/control-plane/**"
      - "services/data-plane/**"
      - "infra/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/api/**"
      - "services/control-plane/**"
      - "services/data-plane/**"
      - "infra/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

env:
  PYTHON_VERSION: "3.12"

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Lint + unit tests. Cloud-agnostic, no infra needed.
  # All ~330 tests use mocks; no real Postgres/Redis required.
  # ──────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Test-only deps. We deliberately do NOT install the optional `mcp`
          # SDK here: the MCP unit + route + e2e tests soft-import the SDK
          # and use a test seam (24 + 22 + 20 = 66 tests pass without it).
          # The 4 integration tests in test_mcp_integration.py auto-skip
          # when the SDK is missing — so CI green is not gated on a heavy
          # optional dependency.
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint (ruff)
        working-directory: .
        run: ruff check --output-format=github

      - name: Run tests
        env:
          # Tests use mocks — no real DB/Redis needed. JWT secret is required
          # by Settings validation when ENV != "dev"; pass a CI-only value.
          # Feature-flag env vars (DATA_ANALYTICS_ENABLED, MCP_ENABLED, etc.)
          # are deliberately NOT pre-set: individual test modules use
          # os.environ.setdefault(...) to pick the value they need, and a
          # CI override here would block their setdefault and break the suite.
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
          ENV: "test"
        run: pytest tests/ -v --tb=short

      - name: Test summary
        if: always()
        run: |
          echo "::group::Test counts"
          pytest tests/ --collect-only -q 2>&1 | tail -3 || true
          echo "::endgroup::"

  # ──────────────────────────────────────────────────
  # Docker image builds (verify Dockerfile compiles).
  # Doesn't push — just validates the build chain.
  # ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: rag-backend-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────
  # Terraform — validate both AWS and Azure modules.
  # ──────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure]
        include:
          - cloud: aws
            tf_dir: infra/terraform
          - cloud: azure
            tf_dir: infra/terraform/azure
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ matrix.tf_dir }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.tf_dir }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ matrix.tf_dir }}
        run: terraform fmt -check -recursive
