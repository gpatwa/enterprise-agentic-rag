# deploy/helm/api/values-staging.yaml
# Staging environment overrides — lightweight, debug-friendly.
# Usage: helm upgrade --install api deploy/helm/api -f values-azure.yaml -f values-staging.yaml

replicaCount: 1

image:
  pullPolicy: Always  # Always pull to get latest staging build

# Alpha: expose a public IP via Azure LoadBalancer. No HTTPS yet — fine
# for internal stakeholder traffic. Add ingress + cert-manager when we
# move past alpha.
service:
  type: LoadBalancer
  port: 8080

env:
  ENV: "staging"
  LOG_LEVEL: "DEBUG"
  SUPPORT_JOB_WORKER_ENABLED: "false"
  # Alpha: serve the new Compass SPA at root (legacy UI stays at /v1).
  # The Dockerfile builds frontend/dist/ during image build; main.py
  # auto-detects and mounts at /.
  NEW_UI_ENABLED: "true"
  # Alpha CORS: open enough for the public hostname plus localhost dev
  # work. Tighten when the hostname is finalised.
  CORS_ORIGINS: "*"

  # ── Alpha posture ─────────────────────────────────────────────
  # Now that the OpenAI key is wired, turn on the LLM-dependent features
  # that only need the seeded data we already have:
  #   - Context layers: lets the agent see the glossary terms (ARR, NRR,
  #     Churn, MQL) seeded by `make seed-alpha`. Answers grounded in our
  #     definitions instead of generic SaaS speak.
  # Still off (need external infra we haven't deployed):
  #   - Multimodal (Gemini embeddings) → would need GOOGLE_API_KEY
  #   - Data analytics (text-to-SQL) → would need a real warehouse
  #   - Reranker (LLM cross-encoder) → low ROI without retrieval
  #   - MCP → flip to true once a real Slack/GitHub/Notion token lands
  RERANKER_PROVIDER: "none"
  MULTIMODAL_ENABLED: "false"
  CONTEXT_LAYERS_ENABLED: "true"
  # OLIST e-commerce dataset (~550K rows, 7 tables) was loaded into the
  # alpha Postgres via scripts/seed_olist.py. With analytics on, the
  # planner routes data questions to the text-to-SQL pipeline against
  # the same DB. Stakeholder demo questions:
  #   - "Avg delivery time by month"
  #   - "Top 10 product categories by revenue"
  #   - "Cancellation rate by state"
  DATA_ANALYTICS_ENABLED: "true"
  MCP_ENABLED: "false"  # flip to true once stakeholders add a real connector

  # Override K8s auto-injected service env vars (they conflict with
  # Pydantic int parsing on the QDRANT_PORT side)
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  NEO4J_URI: "bolt://neo4j:7687"

  # B.1 feedback widget — unset by default; can be added at deploy
  # time via `--set env.FEEDBACK_SLACK_WEBHOOK_URL=https://hooks…`.

  # B.3 Sentry — unset by default; same deploy-time pattern.

  # GOOGLE_API_KEY / TAVILY_API_KEY / OPENAI_API_KEY — loaded from
  # Key Vault via app-env-secret when present.

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

supportWorker:
  enabled: true
  replicaCount: 1
  env:
    SUPPORT_JOB_WORKER_ENABLED: "true"

migrations:
  enabled: true
