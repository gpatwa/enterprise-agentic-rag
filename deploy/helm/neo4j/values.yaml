# deploy/helm/neo4j/values.yaml

neo4j:
  name: "neo4j-cluster"
  edition: "community"

  # Dev/Learning: Reduced resources (prod: 2 CPU, 8Gi)
  resources:
    cpu: "500m"
    memory: "2Gi"

volumes:
  data:
    mode: "dynamic"
    dynamic:
      storageClassName: "gp3"
      accessModes:
        - ReadWriteOnce
      requests:
        storage: "20Gi" # Dev size (prod: 100Gi+)

services:
  neo4j:
    enabled: false
