<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#15151f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Compass mark (simplified circle + needle) -->
  <g transform="translate(96, 96)">
    <circle cx="22" cy="22" r="22" fill="none" stroke="#a5b4fc" stroke-width="2.5"/>
    <path d="M 22 8 L 26 22 L 22 36 L 18 22 Z" fill="#a5b4fc"/>
  </g>

  <text x="160" y="135" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#e5e7eb" letter-spacing="-0.5">Compass</text>

  <!-- Headline -->
  <text x="96" y="320" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="#f5f5f5" letter-spacing="-3">Ask.</text>
  <text x="252" y="320" font-family="'Source Serif 4', Georgia, serif" font-style="italic" font-size="96" font-weight="600" fill="#a5b4fc" letter-spacing="-3">Verify.</text>
  <text x="490" y="320" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="#f5f5f5" letter-spacing="-3">Act.</text>

  <!-- Subhead -->
  <text x="96" y="395" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#9ca3af" letter-spacing="-0.5">The unified answer-and-action layer for enterprise data.</text>

  <!-- Footer pill row -->
  <g font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#9ca3af">
    <text x="96" y="540">SOC 2 Type II</text>
    <text x="270" y="540">·</text>
    <text x="295" y="540">GDPR-ready</text>
    <text x="455" y="540">·</text>
    <text x="480" y="540">Tenant-isolated</text>
    <text x="675" y="540">·</text>
    <text x="700" y="540">Audit log built in</text>
  </g>
</svg>
