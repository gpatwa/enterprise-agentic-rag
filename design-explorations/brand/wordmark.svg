<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <defs>
    <linearGradient id="wgrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#8b7eff"/>
      <stop offset="100%" stop-color="#5fb4ff"/>
    </linearGradient>
    <linearGradient id="wgrad-needle" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#a99dff"/>
      <stop offset="100%" stop-color="#6fc3ff"/>
    </linearGradient>
  </defs>

  <!-- Mark, scaled -->
  <g transform="translate(0,0)">
    <path d="M 32 6 A 26 26 0 1 0 50.385 50.385"
          stroke="url(#wgrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 18 46 L 46 18"
          stroke="url(#wgrad-needle)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 46 18 L 38 18 M 46 18 L 46 26"
          stroke="url(#wgrad-needle)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark text "compass" — Inter, 600, lowercase -->
  <text x="80" y="42"
        font-family="Inter, system-ui, sans-serif"
        font-weight="600"
        font-size="32"
        letter-spacing="-0.02em"
        fill="#e7e9f0">compass</text>
</svg>
